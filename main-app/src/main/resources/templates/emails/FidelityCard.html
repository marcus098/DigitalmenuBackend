<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">La tua Carta Fedeltà</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #007bff;
        }
        .header h1 {
            color: #007bff;
            margin: 0;
            font-size: 24px;
        }
        .header p {
            color: #555;
            margin: 6px 0 0;
            font-size: 14px;
        }
        .content {
            padding: 20px 0;
        }
        .card-box {
            background-color: #f0f7ff;
            border: 1px solid #b8d4f5;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        .card-code {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #0056b3;
            margin: 10px 0;
        }
        .qr-image {
            margin: 15px auto;
            display: block;
            max-width: 200px;
            height: auto;
            border: 4px solid #ffffff;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .card-info {
            margin-top: 16px;
            font-size: 14px;
            color: #444;
        }
        .card-info span {
            font-weight: bold;
            color: #007bff;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #777;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 th:text="${title}">La tua Carta Fedeltà</h1>
        <p th:text="${localeName}">Nome Locale</p>
    </div>
    <div class="content">
        <p th:text="${greeting}">Ecco la tua carta fedeltà:</p>

        <div class="card-box">
            <div class="card-code" th:text="${cardCode}">XXXX-XXXX-XXXX</div>
            <img class="qr-image" th:src="${qrCodeUrl}" src="" alt="QR Code carta fedeltà" />
            <div class="card-info">
                <p th:text="${cardTypeLabel}">Tipo: Carta Punti</p>
                <p th:utext="${scopeLabel}">Obiettivo: <span>100 punti</span></p>
            </div>
        </div>

        <p th:text="${instructions}">Mostra questo QR code al ristorante per accumulare i tuoi punti.</p>
        <p th:text="${closing}">Grazie,</p>
        <p th:text="${team}">The Weitmenu Team</p>
    </div>
    <div class="footer">
        <p>&copy; <span th:text="${#dates.year(#dates.createNow())}">2025</span> Weitmenu. Tutti i diritti riservati.</p>
    </div>
</div>
</body>
</html>
